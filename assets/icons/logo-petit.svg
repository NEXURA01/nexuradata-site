<svg viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg" width="320" height="80" role="img" aria-label="NEXURA DATA">
  <!-- Target mark (left) -->
  <g fill="none" stroke="#e8e4dc" stroke-width="1.4">
    <circle cx="40" cy="40" r="30"/>
    <circle cx="40" cy="40" r="20" opacity="0.55"/>
    <circle cx="40" cy="40" r="10" opacity="0.3"/>
  </g>
  <!-- Crosshair -->
  <g stroke="#e8e4dc" stroke-width="1" opacity="0.5">
    <line x1="2" y1="40" x2="78" y2="40"/>
    <line x1="40" y1="4" x2="40" y2="76"/>
  </g>
  <!-- Bullseye -->
  <circle cx="40" cy="40" r="3.2" fill="#e8e4dc"/>

  <!-- Wordmark — NEXURA prominent -->
  <text x="92" y="44"
        font-family="'Georgia', 'Times New Roman', serif"
        font-size="36" font-weight="400" letter-spacing="2"
        fill="#e8e4dc">NEXURA</text>

  <!-- DATA — secondary, tracked out -->
  <text x="92" y="68"
        font-family="'Georgia', 'Times New Roman', serif"
        font-size="20" font-weight="400" letter-spacing="11"
        fill="#e8e4dc" opacity="0.88">DATA</text>
</svg>

